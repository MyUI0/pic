name: 自动更新订阅源
on:
  # 定时执行：每小时第30分钟执行（UTC时间，可按需修改）
  schedule:
    - cron: '30 * * * *'
  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 赋予提交代码的权限
    steps:
      # 1. 拉取代码到运行环境
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 配置运行环境（安装curl等依赖）
      - name: 配置系统环境
        run: |
          sudo apt update && sudo apt install -y curl sed
          # 给脚本赋执行权限
          chmod +x ./scripts/update-feeds.sh

      # 3. 执行核心更新脚本
      - name: 运行订阅源更新脚本
        id: update-script
        run: ./scripts/update-feeds.sh

      # 4. 提交并推送修改（仅当有真实内容变化时）
      - name: 提交代码变更
        if: steps.update-script.outputs.has_real_change == 'true'
        run: |
          # 配置Git用户信息
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 添加所有修改的文件
          git add ./feeds/ ./logs/
          # 提交（带时间戳）
          git commit -m "🔧 自动更新订阅源 [${{ env.UPDATE_TIME }}]" \
            || echo "⚠️ 无代码变更可提交"
          # 推送代码到主分支
          git push origin main
        env:
          UPDATE_TIME: ${{ github.event.head_commit.timestamp || steps.update-script.outputs.UPDATE_TIME || github.run_id }}
