name: Update Subscription Feed

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    inputs:
      send_test:
        description: 发送测试通知
        required: false
        default: false
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔔 初始化通知状态
        id: notify-init
        run: |
          if [ -z "${{ secrets.BARK_DEVICE_KEY }}" ]; then
            echo "skip_bark=true" >> $GITHUB_OUTPUT
          else
            echo "skip_bark=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔔 发送测试通知
        if: github.event.inputs.send_test == 'true'
        run: |
          curl -s -X POST "https://api.day.app/${{ secrets.BARK_DEVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title":"测试通知",
              "body":"Bark 配置正常",
              "group":"test",
              "sound":"bell",
              "icon":"https://avatars.githubusercontent.com/u/88518685?v=4&size=64"
            }' --max-time 10
          echo "✅ 测试通知已发送"

      - name: 🔧 执行更新脚本
        id: update-feeds
        run: |
          chmod +x ./scripts/update-feeds.sh
          bash ./scripts/update-feeds.sh

      - name: 💾 提交更改
        id: commit-changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f feeds/
          if git diff --cached --quiet -- feeds/; then
            git reset HEAD feeds/ >/dev/null 2>&1
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "🔧 更新订阅源 [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push origin main && echo "has_changes=true" >> $GITHUB_OUTPUT || echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 部署 GitHub Pages
        if: steps.commit-changes.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./feeds
          publish_branch: gh-pages
          keep_files: true
          force_orphan: true

      - name: 🔔 发送更新成功通知（仅当订阅真正更新时）
        if: steps.commit-changes.outputs.has_changes == 'true' && steps.notify-init.outputs.skip_bark == 'false'
        run: |
          DATE="${{ steps.update-feeds.outputs.original_date }}"
          TITLE="✅ 订阅已更新"
          BODY="V2Ray: ${{ steps.update-feeds.outputs.v2ray_count }}行 | Clash: ${{ steps.update-feeds.outputs.clash_count }}行\n源日期: $DATE"
          curl -s -X POST "https://api.day.app/${{ secrets.BARK_DEVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\":\"$TITLE\",
              \"body\":\"$BODY\",
              \"group\":\"subscription-update\",
              \"sound\":\"paymentsuccess\",
              \"badge\":1,
              \"isArchive\":1,
              \"icon\":\"https://avatars.githubusercontent.com/u/88518685?v=4&size=64\"
            }" --max-time 10 || true

      - name: 📊 执行摘要
        if: always()
        run: |
          echo "=== 执行摘要 ==="
          echo "仓库: ${{ github.repository }}"
          echo "V2Ray: ${{ steps.update-feeds.outputs.v2ray_count || 0 }} 行"
          echo "Clash: ${{ steps.update-feeds.outputs.clash_count || 0 }} 行"
          echo "源日期: ${{ steps.update-feeds.outputs.original_date || '未知' }}"
          echo "状态: ${{ steps.update-feeds.outputs.update_status || 'unknown' }}"
          echo "更改: ${{ steps.commit-changes.outputs.has_changes || 'false' }}"
          echo "================"
