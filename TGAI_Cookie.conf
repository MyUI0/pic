# TGAI (Heaizo) 每日签到 + 自动抓包凭证 (Quantumult X 专属)
# 导入方式：QX → 配置 → 重写 → 右上角+ → 粘贴下方链接 → 保存并开启
# 首次使用：打开Heaizo小程序/网页登录一次，自动抓取并保存长期凭证
# 注意：必须先安装并信任QX的HTTPS根证书，开启MITM解密

[rewrite_remote]
# ✅ 修正：使用script-request-body拦截登录请求体（不是response-body）
^https:\/\/chatclient\.heaizo\.com\/user\/login\/fast\/login url script-request-body https://raw.githubusercontent.com/MyUI0/pic/main/TGAI1.js

[task_remote]
# ✅ 修正：正确的定时任务格式（每天00:25执行），无多余换行
25 0 * * * https://raw.githubusercontent.com/MyUI0/pic/main/TGAI1.js, tag=TGAI每日签到, img-url=https://chatclient.heaizo.com/favicon.ico, enabled=true

[MITM]
hostname = chatclient.heaizo.com
