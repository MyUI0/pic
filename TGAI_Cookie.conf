# TGAI (Heaizo) 每日签到 + Cookie获取 (Quantumult X)
# 安装方式：在 rewrite_remote 中添加以下引用
# https://raw.githubusercontent.com/MyUI0/pic/main/TGAI_Cookie.conf, tag=TGAI每日签到, update-interval=86400, opt-parser=true, enabled=true
#
# 首次使用：先登录 chatclient.heaizo.com 触发 cookie 获取
# 签到每天 0:25 自动执行

[rewrite_local]
^https:\/\/chatclient\.heaizo\.com\/user\/login\/fast\/login url script-response-body https://raw.githubusercontent.com/MyUI0/pic/main/TGAI.js

[task_local]
25 0 * * * https://raw.githubusercontent.com/MyUI0/pic/main/TGAI.js, tag=TGAI每日签到, img-url=https://chatclient.heaizo.com/favicon.ico, enabled=true

[mitm]
hostname = chatclient.heaizo.com