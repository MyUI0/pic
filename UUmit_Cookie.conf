# UUmit_Cookie.conf — uumit (小龙人) 签到配置
# QuantumultX — Rewrite + Task 完整配置
# 抓包分析: 2026-06-02
#
# ═══════════════════════════════════════════════════
# 📌 安装步骤
# ═══════════════════════════════════════════════════
# 1. 将下方内容分别添加到 QX 对应配置项中
# 2. 首次使用：打开 uumit 登录一次 → Token 自动捕获保存
# 3. 之后每天自动签到 + 推送结果
#
# ═══════════════════════════════════════════════════
# 📌 Rewrite 配置
#    QX → 配置 → 重写 → + → 粘贴以下 [rewrite_local] 部分
# ═══════════════════════════════════════════════════
# [rewrite_local]
# ^https:\/\/m\.uumit\.com\/api\/v1\/.* url script-request-body https://raw.githubusercontent.com/MyUI0/pic/main/UUmit_Cookie.js
#
# ═══════════════════════════════════════════════════
# 📌 MITM 配置
#    QX → 配置 → 代理 → HTTPS 解密 → + → 粘贴以下 hostname
# ═══════════════════════════════════════════════════
# [MITM]
# hostname = m.uumit.com
#
# ═══════════════════════════════════════════════════
# 📌 Task 配置
#    QX → 配置 → 任务 → + → 粘贴以下 [task_local] 部分
# ═══════════════════════════════════════════════════
# [task_local]
# 0 0 * * * https://raw.githubusercontent.com/MyUI0/pic/main/UUmit_Cookie.js, tag=uumit每日签到, enabled=true

[rewrite_local]
^https:\/\/m\.uumit\.com\/api\/v1\/.* url script-request-body https://raw.githubusercontent.com/MyUI0/pic/main/UUmit_Cookie.js

[MITM]
hostname = m.uumit.com

[task_local]
0 0 * * * https://raw.githubusercontent.com/MyUI0/pic/main/UUmit_Cookie.js, tag=uumit每日签到, enabled=true
